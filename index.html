<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do Life Dashboard</title>

  <!-- Inline script: read stored theme and apply data-theme before first paint to prevent flash -->
  <script>
    (function () {
      var theme = localStorage.getItem('tdl_theme');
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <main class="dashboard-grid">

    <!-- ===== GREETING WIDGET ===== -->
    <!-- Theme toggle is positioned absolutely in the top-right corner of this card -->
    <section class="widget widget--greeting" aria-label="Greeting">
      <button id="theme-toggle" class="btn btn--icon greeting-theme-toggle" aria-label="Toggle theme">🌙</button>
      <div id="greeting-time" class="greeting-time">00:00:00</div>
      <div id="greeting-date" class="greeting-date">Loading date…</div>
      <!-- Greeting message: base text + clickable inline name span -->
      <!-- The JS splits the greeting into base ("GOOD NIGHT,") and the name span -->
      <div id="greeting-message" class="greeting-message">
        <span id="greeting-base"></span><span
          id="userNameDisplay"
          class="greeting-name-inline"
          title="Click to add your name here"
          aria-label="Click to add your name here"
        ></span>
      </div>
      <!-- Daily wish: inline-editable sentence below the greeting -->
      <div
        id="userWishDisplay"
        class="greeting-wish"
        title="Click to edit wish"
        aria-label="Click to edit wish"
      ></div>
    </section>
    <!-- ===== END GREETING WIDGET ===== -->

    <!-- ===== LEFT COLUMN: Timer (fixed height) + Links (stretches to fill) ===== -->
    <div class="col-left">

      <!-- ===== TIMER WIDGET ===== -->
      <section class="widget widget--timer" aria-label="Focus timer">
        <h2 class="widget-title">Focus Timer</h2>
        <div id="timer-display" class="timer-display" aria-live="polite">25:00</div>
        <div id="timer-complete" class="timer-complete" hidden>Session complete!</div>

        <!-- Timer controls: Start, Stop, Reset -->
        <div class="timer-controls">
          <button id="timer-start" class="btn btn--primary">Start</button>
          <button id="timer-stop"  class="btn btn--secondary" disabled>Stop</button>
          <button id="timer-reset" class="btn btn--secondary" disabled>Reset</button>
        </div>
      </section>
      <!-- ===== END TIMER WIDGET ===== -->

      <!-- ===== LINKS WIDGET ===== -->
      <section class="widget widget--links" aria-label="Quick links">
        <h2 class="widget-title">Quick Links</h2>

        <!-- Label + URL inputs and Add control -->
        <div class="links-add-form">
          <label for="link-label-input" class="sr-only">Link label</label>
          <input
            type="text"
            id="link-label-input"
            class="input"
            placeholder="Label"
            aria-label="Link label"
          />
          <label for="link-url-input" class="sr-only">URL</label>
          <input
            type="url"
            id="link-url-input"
            class="input"
            placeholder="https://example.com"
            aria-label="URL"
          />
          <button id="links-add" class="btn btn--primary">Add</button>
        </div>
        <div id="links-validation" class="validation-message" role="alert" aria-live="polite"></div>

        <!-- Links panel rendered by JS as horizontal pills -->
        <ul id="links-list" class="links-list" aria-label="Quick links list"></ul>
        <p id="links-empty" class="empty-state">No links yet. Add one above.</p>
      </section>
      <!-- ===== END LINKS WIDGET ===== -->

    </div>
    <!-- ===== END LEFT COLUMN ===== -->

    <!-- ===== RIGHT COLUMN: Tasks ===== -->
    <div class="col-right">

      <!-- ===== TODO WIDGET ===== -->
      <section class="widget widget--todo" aria-label="To-do list">
        <h2 class="widget-title">Tasks</h2>

        <!-- Task input and Add control -->
        <div class="todo-add-form">
          <label for="todo-input" class="sr-only">New task</label>
          <input
            type="text"
            id="todo-input"
            class="input"
            placeholder="Add a task…"
            aria-label="New task"
          />
          <button id="todo-add" class="btn btn--primary">Add</button>
        </div>
        <div id="todo-validation" class="validation-message" role="alert" aria-live="polite"></div>

        <!-- Task list rendered by JS -->
        <ul id="todo-list" class="todo-list" aria-label="Task list"></ul>
        <p id="todo-empty" class="empty-state" hidden>No tasks yet. Add one above.</p>
      </section>
      <!-- ===== END TODO WIDGET ===== -->

    </div>
    <!-- ===== END RIGHT COLUMN ===== -->

    <!-- ===== QUOTES WIDGET ===== -->
    <!-- Full-width motivational quotes section; content rotated by JS every 10 minutes -->
    <section class="widget widget--quotes" aria-label="Motivational quote">
      <p class="quotes-title">Quote of the day</p>
      <p id="quotes-text" class="quotes-text"></p>
    </section>
    <!-- ===== END QUOTES WIDGET ===== -->

  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="dashboard-footer">
    <p>&copy; 2026 Ucu. All rights reserved.</p>
  </footer>
  <!-- ===== END FOOTER ===== -->

  <script src="js/app.js"></script>
</body>
</html>
